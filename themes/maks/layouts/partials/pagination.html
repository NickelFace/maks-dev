{{ $p := .Paginator }}
{{ if gt $p.TotalPages 1 }}
<nav class="pagination" aria-label="Page navigation">
  {{ if $p.HasPrev }}
  <a class="page-btn" href="{{ $p.Prev.URL }}" aria-label="Previous">←</a>
  {{ else }}
  <span class="page-btn disabled" aria-disabled="true">←</span>
  {{ end }}

  {{ range $p.Pagers }}
  {{ if eq .PageNumber $p.PageNumber }}
  <span class="page-btn active" aria-current="page">{{ .PageNumber }}</span>
  {{ else }}
  <a class="page-btn" href="{{ .URL }}">{{ .PageNumber }}</a>
  {{ end }}
  {{ end }}

  {{ if $p.HasNext }}
  <a class="page-btn" href="{{ $p.Next.URL }}" aria-label="Next">→</a>
  {{ else }}
  <span class="page-btn disabled" aria-disabled="true">→</span>
  {{ end }}
</nav>
{{ end }}
