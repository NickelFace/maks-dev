{{ define "main" }}
<div class="page" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px">
  <div style="font-family:'Unbounded',sans-serif;font-size:72px;font-weight:900;color:var(--accent);line-height:1;opacity:.15">404</div>
  <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-top:-48px">Page not found</div>
  <div style="font-size:13px;color:var(--text3);max-width:380px;line-height:1.7">
    The page you're looking for doesn't exist or has been moved.
  </div>
  <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center">
    <a href="/" style="background:var(--accent);color:#000;padding:9px 20px;border-radius:6px;font-size:12.5px;font-weight:700;text-decoration:none;font-family:'JetBrains Mono',monospace">← Home</a>
    <a href="/posts/" style="background:var(--bg2);color:var(--text);padding:9px 20px;border-radius:6px;font-size:12.5px;font-weight:700;text-decoration:none;border:1px solid var(--border);font-family:'JetBrains Mono',monospace">Blog</a>
    <a href="/certs/" style="background:var(--bg2);color:var(--text);padding:9px 20px;border-radius:6px;font-size:12.5px;font-weight:700;text-decoration:none;border:1px solid var(--border);font-family:'JetBrains Mono',monospace">Certs</a>
  </div>
</div>
{{ end }}
