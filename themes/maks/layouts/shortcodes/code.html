{{ $lang := .Get "lang" | default "bash" }}
<div class="code-block">
  <div class="code-label">
    <span>{{ $lang }}</span>
    {{ with .Get "label" }}<span style="color:var(--text3);font-size:9px;letter-spacing:1px;text-transform:uppercase">{{ . }}</span>{{ end }}
    <button class="copy-btn" onclick="cpPre(this)">copy</button>
  </div>
  {{ highlight (trim .Inner "\n") $lang "tabwidth=2" }}
</div>
